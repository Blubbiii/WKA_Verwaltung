# =============================================================================
# WindparkManager - Portainer Stack
#
# WICHTIG: Alle sensitiven Werte muessen in Portainer als
# "Environment variables" gesetzt werden, NICHT direkt in dieser Datei.
#
# Erforderliche Portainer-Umgebungsvariablen:
#   DATABASE_URL          z.B. postgresql://wpm:PASSWORT@postgres:5432/windparkmanager?schema=public
#   NEXTAUTH_URL          z.B. https://windparkmanager.eu
#   NEXTAUTH_SECRET       min. 32 Zeichen, zufaellig generiert
#   AUTH_SECRET           identisch mit NEXTAUTH_SECRET
#   APP_URL               identisch mit NEXTAUTH_URL
#   NEXT_PUBLIC_APP_URL   identisch mit NEXTAUTH_URL
#   POSTGRES_PASSWORD     Datenbankpasswort
#   MINIO_ROOT_USER       MinIO Admin-Benutzername
#   MINIO_ROOT_PASSWORD   MinIO Admin-Passwort
#   S3_ACCESS_KEY         MinIO Access Key (= MINIO_ROOT_USER)
#   S3_SECRET_KEY         MinIO Secret Key (= MINIO_ROOT_PASSWORD)
#   EMAIL_ENCRYPTION_KEY  64-stelliger Hex-String (openssl rand -hex 32)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/blubbiii/wka_verwaltung:latest
    container_name: wpm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3050:3050"
    environment:
      PORT: "3050"
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      APP_URL: ${APP_URL}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: wpm-documents
      S3_REGION: eu-central-1
      S3_PUBLIC_URL: ${APP_URL}/api/documents
      NODE_ENV: production
      LOG_LEVEL: info
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3050/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: wpm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: windparkmanager
    volumes:
      - pgdata_fresh:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpm -d windparkmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wpm-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Redis - Sessions & Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wpm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wpm-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # MinIO - S3-Kompatibler Objektspeicher
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: wpm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Console nur auf localhost - kein direkter Zugriff aus dem Internet
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - wpm-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # MinIO Init - Erstellt den Storage-Bucket beim ersten Start
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: wpm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set wpm http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing wpm/wpm-documents;
      echo 'MinIO Bucket erstellt: wpm-documents';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - wpm-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata_fresh:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# Netzwerk
# =============================================================================
networks:
  wpm-network:
    driver: bridge
    name: wpm-network
