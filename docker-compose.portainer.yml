# =============================================================================
# WindparkManager - Portainer Stack
#
# WICHTIG: Alle sensitiven Werte muessen in Portainer als
# "Environment variables" gesetzt werden, NICHT direkt in dieser Datei.
#
# Erforderliche Portainer-Umgebungsvariablen:
#   DATABASE_URL              z.B. postgresql://wpm:PASSWORT@postgres:5432/windparkmanager?schema=public
#   NEXTAUTH_URL              z.B. https://windparkmanager.eu
#   NEXTAUTH_SECRET           min. 32 Zeichen, zufaellig generiert
#   AUTH_SECRET               identisch mit NEXTAUTH_SECRET
#   APP_URL                   identisch mit NEXTAUTH_URL
#   NEXT_PUBLIC_APP_URL       identisch mit NEXTAUTH_URL
#   POSTGRES_PASSWORD         Datenbankpasswort
#   MINIO_ROOT_USER           MinIO Admin-Benutzername
#   MINIO_ROOT_PASSWORD       MinIO Admin-Passwort
#   S3_ACCESS_KEY             MinIO Access Key (= MINIO_ROOT_USER)
#   S3_SECRET_KEY             MinIO Secret Key (= MINIO_ROOT_PASSWORD)
#   EMAIL_ENCRYPTION_KEY      64-stelliger Hex-String (openssl rand -hex 32)
#   MEILISEARCH_KEY           min. 32 Zeichen (openssl rand -hex 16)
#   METRICS_TOKEN             Bearer-Token fuer /api/metrics (openssl rand -hex 16)
#   REDIS_PASSWORD            Redis-Authentifizierungspasswort
#   METABASE_DB_PASSWORD      Passwort fuer wpm_readonly DB-User (optional, nur wenn Metabase genutzt)
#   NEXT_PUBLIC_METABASE_URL  z.B. http://192.168.178.101:3002
#   METABASE_EMBEDDING_SECRET 64-stelliger Hex-String (openssl rand -hex 32)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/blubbiii/wka_verwaltung:latest
    container_name: wpm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3050:3050"
    environment:
      PORT: "3050"
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      APP_URL: ${APP_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: wpm-documents
      S3_REGION: eu-central-1
      S3_PUBLIC_URL: ${APP_URL}/api/documents
      NODE_ENV: production
      LOG_LEVEL: info
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY}
      METRICS_TOKEN: ${METRICS_TOKEN}
      NEXT_PUBLIC_METABASE_URL: ${NEXT_PUBLIC_METABASE_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3050/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database (TimescaleDB — PG16-kompatibles Drop-in-Replacement)
  # Gepinnte Version fuer Stabilitaet (kein latest-Tag).
  # Nach erstem Start: scripts/setup-timescaledb.sql ausfuehren!
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: wpm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: windparkmanager
      # TimescaleDB-Tuning fuer kleinere Server
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - pgdata_fresh:/var/lib/postgresql/data
    healthcheck:
      # Nur -U pruefen — Datenbank wird erst nach vollstaendiger Init beruecksichtigt
      test: ["CMD-SHELL", "pg_isready -U wpm"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Redis - Sessions & Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wpm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # MinIO - S3-Kompatibler Objektspeicher
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: wpm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Console nur auf localhost - kein direkter Zugriff aus dem Internet
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 10
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # MinIO Init - Erstellt den Storage-Bucket beim ersten Start
  # Wartet per Retry-Loop auf MinIO — kein service_healthy noetig.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: wpm-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set wpm http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'Warte auf MinIO...'; sleep 3;
      done;
      mc mb --ignore-existing wpm/wpm-documents;
      echo 'MinIO Bucket erstellt: wpm-documents';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Meilisearch — Typo-tolerante Volltextsuche
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: wpm-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Backup — Automatische DB-Sicherung mit Retention Policy
  # TimescaleDB-Image wegen aktiver Hypertables (pg_dump braucht Extension)
  # Cron: daily@02:00, weekly@Sun/03:00, monthly@1st/04:00
  # ---------------------------------------------------------------------------
  backup:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: wpm-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: wpm
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: windparkmanager
      PGPORT: "5432"
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAILY: "7"
      BACKUP_RETENTION_WEEKLY: "4"
      BACKUP_RETENTION_MONTHLY: "3"
      BACKUP_S3_ENABLED: "false"
    configs:
      - source: backup_script
        target: /scripts/backup-db.sh
        mode: 0755
      - source: restore_script
        target: /scripts/restore-db.sh
        mode: 0755
    volumes:
      - backup_data:/backups
    entrypoint: /bin/bash
    command:
      - -c
      - |
        apt-get update && apt-get install -y --no-install-recommends cron && rm -rf /var/lib/apt/lists/*
        echo '0 2 * * * root /scripts/backup-db.sh daily >> /var/log/backup.log 2>&1' > /etc/cron.d/wpm-backup
        echo '0 3 * * 0 root /scripts/backup-db.sh weekly >> /var/log/backup.log 2>&1' >> /etc/cron.d/wpm-backup
        echo '0 4 1 * * root /scripts/backup-db.sh monthly >> /var/log/backup.log 2>&1' >> /etc/cron.d/wpm-backup
        chmod 0644 /etc/cron.d/wpm-backup
        touch /var/log/backup.log
        echo "[$$(date)] Backup scheduler started — daily@02:00, weekly@Sun/03:00, monthly@1st/04:00"
        /scripts/backup-db.sh daily
        echo "[$$(date)] Initial backup completed"
        cron -f
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Backup Manual — On-Demand Backup (nur mit --profile tools starten)
  # docker compose --profile tools run backup-manual daily
  # ---------------------------------------------------------------------------
  backup-manual:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: wpm-backup-manual
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: wpm
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: windparkmanager
      BACKUP_DIR: /backups
      BACKUP_S3_ENABLED: "false"
    configs:
      - source: backup_script
        target: /scripts/backup-db.sh
        mode: 0755
      - source: restore_script
        target: /scripts/restore-db.sh
        mode: 0755
    volumes:
      - backup_data:/backups
    entrypoint: /scripts/backup-db.sh
    command: ["daily"]
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Prometheus — Metriken-Sammlung
  # Config wird als Docker-Config inline definiert (kein Host-Mount noetig)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: wpm-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    networks:
      - wpm-network

  # ---------------------------------------------------------------------------
  # Metabase — Business Intelligence (iFrame in WPM eingebettet)
  # Aufruf: http://SERVER_IP:3002
  # Beim ersten Start: Browser oeffnen und Einrichtung abschliessen (2-3 Min.)
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: wpm-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: windparkmanager
      MB_DB_USER: wpm_readonly
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_SITE_URL: ${NEXT_PUBLIC_METABASE_URL:-http://localhost:3002}
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBEDDING_SECRET}
      JAVA_TIMEZONE: Europe/Berlin
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - metabase_data:/metabase-data
    networks:
      - wpm-network

# =============================================================================
# Docker Configs (inline — kein Host-Dateisystem noetig)
# =============================================================================
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 30s
        evaluation_interval: 30s
      scrape_configs:
        - job_name: windparkmanager
          static_configs:
            - targets: ['app:3050']
          metrics_path: /api/metrics
          params:
            token: ['${METRICS_TOKEN}']
  # HINWEIS: Fuer Portainer-Deployment muessen die Scripts als inline `content:`
  # eingefuegt werden (mit $$ statt $ fuer Shell-Variablen).
  # Lokal funktionieren die `file:` Referenzen direkt.
  backup_script:
    file: ./scripts/backup-db.sh
  restore_script:
    file: ./scripts/restore-db.sh

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata_fresh:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  meilisearch_data:
    driver: local
  prometheus_data:
    driver: local
  metabase_data:
    driver: local
  backup_data:
    driver: local

# =============================================================================
# Netzwerk
# =============================================================================
networks:
  wpm-network:
    driver: bridge
    name: wpm-network
